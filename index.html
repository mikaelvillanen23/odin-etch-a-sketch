<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Etch-a-Sketch project</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <h1>Etch a Sketch!</h1>
        <div class="welcome">
            <p>Welcome fellow Etcher!
                Feel free to unleash your creativity on the canvas below.</p>
            <p>This application is intended to be used with a computer and a mouse.<br>
                You can <span class="draw"><strong>draw with left-click</strong></span> 
                and <span class="erase"><strong>erase with right-click</strong></span>.</p>
            <h3>Happy Sketching!</h3>
        </div>
        <div id="buttonContainer">
            <button type="button" id="resetButton">Clear canvas</button>
            <button type="button" id="canvasButton">Create a new canvas</button>
            <button type="button" id="gridButton">Show grid</button>
            <label for="colorPicker">Change color:</label>
            <input type="color" id="colorPicker">
            <label for="randomizer">Randomize color:</label>
            <input type="checkbox" id="randomizer">
        </div>
        <div id="container"></div>
        <h4>Current canvas size: <span class="currentSize"></span></h4>
        <p>© Mikael Villanen 2026</p>

        <script src="script.js"></script>
    </body>
</html>
